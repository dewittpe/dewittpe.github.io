# Site settings
title: Peter E. DeWitt, Ph.D.
description: 'Biostatistician'
url: 'dewittpe.github.io'
baseurl: '/'
google_analytics: 'UA-87261307-1'
# disqus_shortname: 'your-disqus-name'

remote_theme: dewittpe/jekyll-uno

author:
  name: 'Peter DeWitt'
  email: dewittpe@gmail.com
  twitter_username: Statistics4All
  facebook_username:
  github_username:  dewittpe
  linkedin_username:
  researchgate_username: Peter_DeWitt
  google_scholar: CBv7wlQAAAAJ&hl=en

defaults:
  -
    scope:
      path: ''
      type: 'posts'
    values:
        layout: 'post'

# Build settings
destination: _site
paginate: 10
permalink: /:year/:month/:day/:title/
markdown: kramdown
highlighter: rouge

sass:
    sass_dir: _sass
    style: compressed

kramdown:
  # use Github Flavored Markdown
  input: GFM
  # do not replace newlines by <br>s
  hard_wrap: false

plugins:
  - jekyll-paginate
  - jekyll-remote-theme
  - jekyll-include-cache

exclude: ['README.md', 'Gemfile', 'Gemfile.lock', '.travis.yml', 'vendor']
